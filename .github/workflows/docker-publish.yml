# Intentionally rebuilds images from scratch on every run rather than sharing
# artifacts from the Build workflow. Sharing build artifacts across workflows
# adds significant complexity (cross-workflow ref resolution, staging layers,
# fragile artifact passing). Each workflow stays self-contained and predictable.
# The trade-off is a duplicate build on dev/tag pushes, which is acceptable.

name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to build from'
        required: true
        default: 'main'
      service:
        description: 'Service to release'
        required: true
        type: choice
        options:
          - core
          - worker
      version:
        description: 'Version to release (e.g. v1.2.3 — must match apps/<service>/package.json)'
        required: true
      force:
        description: 'Force push even if the tag already exists'
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: [ "Build" ]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  ORG: tha-lprd

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - app: core
            image: lprd-core
          - app: worker
            image: lprd-core-worker
    steps:
      - name: Check service scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.service }}" != "${{ matrix.app }}" ]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        if: steps.scope.outputs.run == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: '${{ inputs.version }}' — expected vMAJOR.MINOR.PATCH (e.g. v1.2.3)"
            exit 1
          fi

      - name: Checkout
        if: steps.scope.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

      - name: Verify version matches package.json
        if: steps.scope.outputs.run == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          CLEAN_VERSION="${{ inputs.version }}"
          CLEAN_VERSION="${CLEAN_VERSION#v}"
          PKG_VERSION=$(jq -r '.version' apps/${{ matrix.app }}/package.json)
          if [ "$PKG_VERSION" != "$CLEAN_VERSION" ]; then
            echo "Version mismatch: apps/${{ matrix.app }}/package.json has $PKG_VERSION but input is $CLEAN_VERSION"
            exit 1
          fi

      - name: Check tag does not already exist
        if: steps.scope.outputs.run == 'true' && github.event_name == 'workflow_dispatch' && !inputs.force
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}:${{ inputs.version }} > /dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists — refusing to overwrite."
            exit 1
          fi

      - name: Set up Docker Buildx
        if: steps.scope.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.scope.outputs.run == 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        if: steps.scope.outputs.run == 'true'
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          tags: |
            type=raw,value=dev,enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Validate core Docker build variables
        if: steps.scope.outputs.run == 'true' && matrix.app == 'core'
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_CONVEX_URL }}" ]; then
            echo "::error::NEXT_PUBLIC_CONVEX_URL is required as an Actions variable."
            exit 1
          fi

          if [ -z "${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}" ]; then
            echo "::error::NEXT_PUBLIC_WORKOS_REDIRECT_URI is required as an Actions variable."
            exit 1
          fi

      - name: Build and push Docker image
        if: steps.scope.outputs.run == 'true'
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ vars.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_WORKOS_REDIRECT_URI=${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}

      - name: Generate artifact attestation
        if: steps.scope.outputs.run == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
