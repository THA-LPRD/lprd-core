name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check + Lint
        run: bunx turbo run typecheck lint

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: core
            target: runner
            image: lprd-core
          - app: worker
            target: runner
            image: lprd-core-worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate core Docker build variables
        if: matrix.app == 'core'
        run: |
          if [ -z "${{ vars.NEXT_PUBLIC_CONVEX_URL }}" ]; then
            echo "::error::NEXT_PUBLIC_CONVEX_URL is required as an Actions variable."
            exit 1
          fi

          if [ -z "${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}" ]; then
            echo "::error::NEXT_PUBLIC_WORKOS_REDIRECT_URI is required as an Actions variable."
            exit 1
          fi

      - name: Build (no push)
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          target: ${{ matrix.target }}
          push: false
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ vars.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_WORKOS_REDIRECT_URI=${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
